<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="电芯设计">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007AFF">
<title>电芯设计 · 移动版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F2F2F7;color:#1C1C1E;padding-bottom:env(safe-area-inset-bottom)}
.h{background:#fff;padding:10px 14px;text-align:center;border-bottom:1px solid #E5E5EA;position:sticky;top:0;z-index:10}
.h h1{font-size:17px;font-weight:700;color:#007AFF}.h p{font-size:11px;color:#8E8E93}
.nav{display:flex;background:#fff;border-bottom:1px solid #E5E5EA;position:sticky;top:57px;z-index:9}
.nav b{flex:1;padding:10px 0;border:0;background:none;font-size:13px;color:#8E8E93;border-bottom:2px solid transparent}
.nav b.on{color:#007AFF;border-bottom-color:#007AFF;font-weight:600}
.pg{display:none;padding:10px}.pg.on{display:block}
.c{background:#fff;border-radius:12px;padding:12px;margin-bottom:8px}
.c h3{font-size:14px;color:#007AFF;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #F2F2F7}
.rw{display:flex;align-items:center;margin-bottom:4px;gap:6px}
.rw label{font-size:11px;color:#8E8E93;min-width:66px;text-align:right}
.rw input,.rw select{flex:1;padding:7px 8px;border:1px solid #E5E5EA;border-radius:8px;font-size:13px;background:#F9F9F9;color:#1C1C1E}
.rw .u{font-size:10px;color:#8E8E93;min-width:30px}
.btn{padding:12px;border:0;border-radius:10px;font-size:14px;font-weight:600;width:100%;background:#007AFF;color:#fff;cursor:pointer}
.btn:active{background:#0056CC}
.chk{display:flex;align-items:center;gap:4px;font-size:11px;margin:3px 0;padding:4px 6px;background:#FFF3E0;border-radius:6px}
.chk input[type=checkbox]{width:16px;height:16px}
.chk select,.chk input{flex:1;padding:5px;border:1px solid #E5E5EA;border-radius:6px;font-size:11px;background:#fff}
.res-big{font-size:20px;font-weight:700;color:#007AFF;text-align:center;padding:10px}
.res-g{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ri{background:#F9F9F9;border-radius:8px;padding:8px;text-align:center}
.ri .v{font-size:17px;font-weight:700;color:#1C1C1E}.ri .l{font-size:10px;color:#8E8E93}
table{width:100%;border-collapse:collapse;font-size:11px}
table td{padding:5px 3px;border-bottom:1px solid #F2F2F7}
table td:first-child{color:#8E8E93;width:38%}
table td:last-child{text-align:right;font-weight:500}
.s{font-size:12px;font-weight:700;color:#007AFF}.s td{padding:7px 3px 3px}
.ok{background:#E8F5E9;color:#2E7D32;padding:8px;border-radius:8px;font-size:12px;margin:6px 0;text-align:center}
.ng{background:#FFEBEE;color:#C62828;padding:8px;border-radius:8px;font-size:12px;margin:6px 0;text-align:center}
canvas{width:100%;max-width:360px;display:block;margin:6px auto}
</style>
</head>
<body>
<div class="h"><h1>🔋 电芯设计</h1><p>18650·21700·4680·33140  — 移动版</p></div>
<div class="nav"><b class="on" onclick="T('d')">参数</b><b onclick="T('r')">结果</b><b onclick="T('v')">可视</b></div>

<div id="d" class="pg on">
  <div class="c">
    <h3>电芯规格</h3>
    <div class="rw"><label>型号</label><select id="cell" onchange="onCell()"><option>18650</option><option>21700</option><option>4680</option><option>33140</option></select></div>
    <div class="rw"><label>目标容量</label><input id="cap" type="number" value="3000"><span class="u">mAh</span></div>
    <div class="rw"><label>正极</label><select id="pMat" onchange="loadMat()"><option>NCM811</option><option>NCA</option><option>NCM622</option><option>NCM523</option><option>LFP</option><option>LMFP</option><option>LCO</option></select></div>
    <div class="rw"><label>负极</label><select id="nMat"><option>天然石墨</option><option>人造石墨</option><option>石墨+Si(96.5/3.5)</option><option>硅碳(SiC)</option><option>硅氧(SiOx)</option></select></div>
  </div>
  <div class="c">
    <h3>正极参数</h3>
    <div class="rw"><label>克容量</label><input id="pCap" type="number" value="182"><span class="u">mAh/g</span></div>
    <div class="rw"><label>活物占比</label><input id="pAf" type="number" value="0.95" step="0.01"></div>
    <div class="rw"><label>面密度</label><input id="pAd" type="number" value="20"><span class="u">mg/cm²</span></div>
    <div class="rw"><label>压实密度</label><input id="pPd" type="number" value="3.45" step="0.01"><span class="u">g/cm³</span></div>
    <div class="rw"><label>Al箔厚</label><input id="pFoil" type="number" value="15"><span class="u">µm</span></div>
    <div class="rw"><label>宽度</label><input id="pW" type="number" value="57"><span class="u">mm</span></div>
    <div class="rw"><label>膨胀率</label><input id="pExp" type="number" value="0" step="0.001"></div>
  </div>
  <div class="c">
    <h3>负极参数</h3>
    <div class="rw"><label>克容量</label><input id="nCap" type="number" value="350"><span class="u">mAh/g</span></div>
    <div class="rw"><label>活物占比</label><input id="nAf" type="number" value="0.95" step="0.01"></div>
    <div class="rw"><label>面密度</label><input id="nAd" type="number" value="11"><span class="u">mg/cm²</span></div>
    <div class="rw"><label>压实密度</label><input id="nPd" type="number" value="1.65" step="0.01"><span class="u">g/cm³</span></div>
    <div class="rw"><label>Cu箔厚</label><input id="nFoil" type="number" value="8"><span class="u">µm</span></div>
    <div class="rw"><label>宽余量</label><input id="nWE" type="number" value="2"><span class="u">mm</span></div>
    <div class="rw"><label>膨胀率</label><input id="nExp" type="number" value="0.01" step="0.001"></div>
  </div>
  <div class="c">
    <h3>隔膜·卷绕·电解液</h3>
    <div class="rw"><label>隔膜厚</label><input id="sT" type="number" value="16"><span class="u">µm</span></div>
    <div class="rw"><label>隔膜孔隙率</label><input id="sPor" type="number" value="0.49" step="0.01"></div>
    <div class="rw"><label>卷针</label><input id="md" type="number" value="3.2"><span class="u">mm</span></div>
    <div class="rw"><label>电解液密度</label><input id="eD" type="number" value="1.22"><span class="u">g/cm³</span></div>
    <div class="rw"><label>注液系数</label><input id="eF" type="number" value="1.20" step="0.01"><span class="u">×</span></div>
    <div class="rw"><label>N/P目标</label><input id="npT" type="number" value="1.10" step="0.01"></div>
  </div>
  <div class="c">
    <h3>掺杂混合 (可选)</h3>
    <div class="chk"><input type="checkbox" id="pbOn"><span>正极掺杂</span><select id="pbMat"><option>NCM523</option><option>NCM811</option><option>NCA</option><option>LMFP</option></select><input id="pbR" type="number" value="80" min="0" max="100" style="width:45px"><span>%主材</span></div>
    <div class="chk"><input type="checkbox" id="nbOn"><span>负极掺杂</span><select id="nbMat"><option>硅碳(SiC)</option><option>硅氧(SiOx)</option><option>石墨+Si(96.5/3.5)</option></select><input id="nbR" type="number" value="95" min="0" max="100" style="width:45px"><span>%主材</span></div>
  </div>
  <button class="btn" onclick="calc()">⚡ 开始计算</button>
</div>

<div id="r" class="pg"><div id="rc"><p style="text-align:center;color:#8E8E93;padding:40px">← 输入参数后点击计算</p></div></div>
<div id="v" class="pg"><canvas id="cv" width="360" height="400"></canvas><p id="vl" style="text-align:center;color:#8E8E93;font-size:12px">计算后显示</p></div>

<script>
const PM={
  NCM811:{cap:182,af:0.95,pd:3.45,ad:[16,20]},
  NCA:{cap:200,af:0.95,pd:3.59,ad:[16,20]},
  NCM622:{cap:180,af:0.94,pd:3.5,ad:[17,21]},
  NCM523:{cap:160,af:0.94,pd:3.5,ad:[18,22]},
  LFP:{cap:140,af:0.93,pd:3.3,ad:[20,24]},
  LMFP:{cap:150,af:0.93,pd:2.6,ad:[18,22]},
  LCO:{cap:150,af:0.95,pd:3.9,ad:[19,23]}
};
const NM={
  "天然石墨":{cap:350,af:0.95,pd:1.6,ad:[10,13],exp:0},
  "人造石墨":{cap:320,af:0.95,pd:1.6,ad:[10,12],exp:0},
  "石墨+Si(96.5/3.5)":{cap:400,af:0.95,pd:1.494,ad:[10,12],exp:0.008},
  "硅碳(SiC)":{cap:450,af:0.92,pd:1.55,ad:[8,10],exp:0.02},
  "硅氧(SiOx)":{cap:450,af:0.90,pd:1.5,ad:[8,10],exp:0.015}
};
const CS={
  18650:{oD:18,H:65,iD:17.4,cmax:17.0,wr:[56,58],mr:[3.0,3.5]},
  21700:{oD:21,H:70,iD:20.4,cmax:20.0,wr:[60,62],mr:[3.5,4.0]},
  4680:{oD:46,H:80,iD:45.0,cmax:44.7,wr:[70,75],mr:[5.0,6.0]},
  33140:{oD:33,H:140,iD:32.2,cmax:31.8,wr:[125,132],mr:[5.0,6.0]}
};
let R=null;

function V(id){return parseFloat(document.getElementById(id).value)||0}
function T(t){
  document.querySelectorAll('.nav b').forEach((b,i)=>b.classList.toggle('on',(t=='d'&&i==0)||(t=='r'&&i==1)||(t=='v'&&i==2)));
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById(t).classList.add('on');
  if(t=='v'&&R) drawV();
}
function loadMat(){
  let p=PM[document.getElementById('pMat').value];
  if(p){document.getElementById('pCap').value=p.cap;document.getElementById('pAf').value=p.af;document.getElementById('pAd').value=(p.ad[0]+p.ad[1])/2;document.getElementById('pPd').value=p.pd;}
  let n=NM[document.getElementById('nMat').value];
  if(n){document.getElementById('nCap').value=n.cap;document.getElementById('nAf').value=n.af;document.getElementById('nAd').value=(n.ad[0]+n.ad[1])/2;document.getElementById('nPd').value=n.pd;document.getElementById('nExp').value=n.exp;}
}
function onCell(){
  let s=CS[document.getElementById('cell').value];
  document.getElementById('pW').value=(s.wr[0]+s.wr[1])/2;
  document.getElementById('md').value=(s.mr[0]+s.mr[1])/2;
}
function blend(a,b,r){let o={};for(let k in a)o[k]=(typeof a[k]=='number')?a[k]*r+b[k]*(1-r):a[k];return o}

function calc(){
  let ct=document.getElementById('cell').value,cs=CS[ct];
  let cap=V('cap');
  // Positive
  let pCap=V('pCap'),pAf=V('pAf'),pAd=V('pAd'),pPd=V('pPd'),pFoil=V('pFoil'),pW=V('pW'),pExp=V('pExp');
  if(document.getElementById('pbOn').checked){let pm=PM[document.getElementById('pMat').value],bm=PM[document.getElementById('pbMat').value],r=V('pbR')/100;let b=blend(pm,bm,r);pCap=b.cap;pAf=b.af;pAd=(b.ad[0]+b.ad[1])/2;pPd=b.pd;}
  let posTrueD=1/(pAf/4.65+0.02/2.05+0.03/1.77);
  let posPor=1-pPd/posTrueD,posSC=2*pAd*pAf*pCap/1000,posArea=cap*1000/(2*pAd*pAf*pCap),posLen=posArea/(pW/10)*10;
  let posCoatW=posArea*2*pAd/1000,posActiveW=posCoatW*pAf;
  let posFoilW=posArea*2*(pFoil*0.995/10000)*2.73,posTotalW=posCoatW+posFoilW;
  let posCoatV=posCoatW/posTrueD,posPoreV=posCoatV*posPor;
  let posCoatT=pAd*10/pPd*1.01,posTotalT=2*posCoatT+pFoil*0.995;

  // Negative
  let nCap=V('nCap'),nAf=V('nAf'),nAd=V('nAd'),nPd=V('nPd'),nFoil=V('nFoil'),nWE=V('nWE'),nExp=V('nExp');
  if(document.getElementById('nbOn').checked){let nm=NM[document.getElementById('nMat').value],bm=NM[document.getElementById('nbMat').value],r=V('nbR')/100;let b=blend(nm,bm,r);nCap=b.cap;nAf=b.af;nAd=(b.ad[0]+b.ad[1])/2;nPd=b.pd;}
  let negTrueD=1/(nAf/2.2+0.01/2.05+0.015/1.28+0.025/1.0);
  let negPor=1-nPd/negTrueD,negSC=2*nAd*nAf*nCap/1000,negW=pW+nWE,negLen=posLen+30;
  let negArea=negLen/10*negW/10,negCoatW=negArea*2*nAd/1000,negActiveW=negCoatW*nAf;
  let negFoilW=negArea*2*(nFoil/10000)*8.46,negTotalW=negCoatW+negFoilW;
  let negCoatV=negCoatW/negTrueD,negPoreV=negCoatV*negPor;
  let negCoatT=nAd*10/nPd*1.01,negTotalT=2*negCoatT+nFoil;
  let npRatio=(negActiveW*nCap)/(posActiveW*pCap);

  // Separator
  let sT=V('sT'),sPor=V('sPor'),md=V('md');
  let sepW=negW+2,sepLen=posLen+4*Math.PI*md*1.2;
  let sepArea=sepLen/10*sepW/10,sepVol=sepArea*2*sT/10000,sepPoreV=sepVol*sPor,sepWt=sepVol*1.0;

  // Winding
  let unitT=posTotalT*(1+pExp)+negTotalT*(1+nExp)+2*sT;
  let layers=Math.floor((cs.cmax/2-md/2)/(unitT/1000)),coreD=md+2*(unitT/1000)*layers;
  let coreD100=md+2*(unitT/1000)*layers;

  // Electrolyte
  let eD=V('eD'),eF=V('eF'),totalPore=posPoreV+negPoreV+sepPoreV,elyteVol=totalPore*eF,elyteWt=elyteVol*eD;

  // Hardware
  let caseArea=Math.PI*cs.oD/10*cs.H/10,caseWt=caseArea*0.20;
  let insWt=Math.PI*(cs.iD/20)**2*(0.0446+0.0159),tabWt=0.25;

  // Totals
  let coreWt=posTotalW+negTotalW+sepWt+elyteWt,totalWt=coreWt+caseWt+insWt+tabWt;
  let cellVol=Math.PI*(cs.oD/20)**2*cs.H/10,energyWh=cap/1000*3.65;
  let gravED=energyWh/(totalWt/1000),volED=energyWh/cellVol*1000;
  let coreFit=coreD100<=cs.cmax,npSafe=npRatio>=1.05;

  R={ct,cap,npRatio,posLen,negLen,posCoatT,posTotalT,negCoatT,negTotalT,unitT,layers,coreD,coreD100,margin:cs.cmax-coreD100,
    posPor,negPor,posArea,negArea,posActiveW,negActiveW,posCoatW,negCoatW,posFoilW,negFoilW,
    posTotalW,negTotalW,sepWt,elyteWt,totalPore,elyteVol,caseWt,totalWt,energyWh,cellVol,gravED,volED,coreFit,npSafe,posSC,negSC};
  showR();T('r');
}

function showR(){
  if(!R)return;
  let h='';
  h+=`<div class="res-big">${R.totalWt.toFixed(1)}g  ·  ${R.gravED.toFixed(0)} Wh/kg</div>`;
  h+=`<div class="res-g">`;
  h+=`<div class="ri"><div class="v">${R.cap}mAh</div><div class="l">容量</div></div>`;
  h+=`<div class="ri"><div class="v">${R.npRatio.toFixed(3)}</div><div class="l">N/P比</div></div>`;
  h+=`<div class="ri"><div class="v">${R.posLen.toFixed(0)}mm</div><div class="l">正极长度</div></div>`;
  h+=`<div class="ri"><div class="v">${R.negLen.toFixed(0)}mm</div><div class="l">负极长度</div></div>`;
  h+=`<div class="ri"><div class="v">${R.layers}层</div><div class="l">卷绕层数</div></div>`;
  h+=`<div class="ri"><div class="v">${R.coreD.toFixed(2)}mm</div><div class="l">卷芯直径</div></div>`;
  h+=`<div class="ri"><div class="v">${(R.posPor*100).toFixed(1)}/${(R.negPor*100).toFixed(1)}%</div><div class="l">孔隙率 正/负</div></div>`;
  h+=`<div class="ri"><div class="v">${R.volED.toFixed(0)}Wh/L</div><div class="l">体积能量密度</div></div>`;
  h+=`</div>`;

  h+=`<div class="c"><h3>正极</h3><table>`;
  let R2=[["面容量",R.posSC.toFixed(4),"mAh/cm²"],["涂层厚",R.posCoatT.toFixed(1),"µm"],["总厚度",R.posTotalT.toFixed(1),"µm"],["涂布面积",R.posArea.toFixed(1),"cm²"],["活性质量",R.posActiveW.toFixed(2),"g"],["涂层质量",R.posCoatW.toFixed(2),"g"],["Al箔质量",R.posFoilW.toFixed(2),"g"],["总质量",R.posTotalW.toFixed(2),"g"]];
  for(let r of R2)h+=`<tr><td>${r[0]}</td><td>${r[1]}</td><td style="font-size:10px;color:#8E8E93">${r[2]}</td></tr>`;
  h+=`</table></div>`;

  h+=`<div class="c"><h3>负极</h3><table>`;
  let R3=[["面容量",R.negSC.toFixed(4),"mAh/cm²"],["涂层厚",R.negCoatT.toFixed(1),"µm"],["总厚度",R.negTotalT.toFixed(1),"µm"],["涂布面积",R.negArea.toFixed(1),"cm²"],["活性质量",R.negActiveW.toFixed(2),"g"],["涂层质量",R.negCoatW.toFixed(2),"g"],["Cu箔质量",R.negFoilW.toFixed(2),"g"],["总质量",R.negTotalW.toFixed(2),"g"]];
  for(let r of R3)h+=`<tr><td>${r[0]}</td><td>${r[1]}</td><td style="font-size:10px;color:#8E8E93">${r[2]}</td></tr>`;
  h+=`</table></div>`;

  h+=`<div class="c"><h3>隔膜·卷绕·电解液</h3><table>`;
  h+=`<tr><td>隔膜质量</td><td>${R.sepWt.toFixed(2)}</td><td>g</td></tr>`;
  h+=`<tr><td>单元总厚</td><td>${R.unitT.toFixed(1)}</td><td>µm</td></tr>`;
  h+=`<tr><td>卷芯 D/D100</td><td>${R.coreD.toFixed(2)}/${R.coreD100.toFixed(2)}</td><td>mm</td></tr>`;
  h+=`<tr><td>裕量</td><td>${R.margin.toFixed(3)}</td><td>mm</td></tr>`;
  h+=`<tr><td>总孔隙</td><td>${R.totalPore.toFixed(3)}</td><td>cm³</td></tr>`;
  h+=`<tr><td>注液量</td><td>${R.elyteVol.toFixed(2)}</td><td>cm³</td></tr>`;
  h+=`<tr><td>电解液质量</td><td>${R.elyteWt.toFixed(2)}</td><td>g</td></tr>`;
  h+=`</table></div>`;

  h+=`<div class="c"><h3>汇总</h3><table>`;
  h+=`<tr><td>壳体</td><td>${R.caseWt.toFixed(2)}</td><td>g</td></tr>`;
  h+=`<tr><td>电芯总质量</td><td style="font-weight:700">${R.totalWt.toFixed(2)}</td><td>g</td></tr>`;
  h+=`<tr><td>能量</td><td>${R.energyWh.toFixed(2)}</td><td>Wh</td></tr>`;
  h+=`<tr><td>质量能量密度</td><td style="font-weight:700">${R.gravED.toFixed(0)}</td><td>Wh/kg</td></tr>`;
  h+=`<tr><td>体积能量密度</td><td style="font-weight:700">${R.volED.toFixed(0)}</td><td>Wh/L</td></tr>`;
  h+=`</table></div>`;

  if(R.coreFit&&R.npSafe)h+=`<div class="ok">✅ 入壳成功 · N/P安全 · 裕量${R.margin.toFixed(2)}mm</div>`;
  else if(!R.coreFit)h+=`<div class="ng">⛔ 入壳失败! D100%=${R.coreD100.toFixed(2)}mm > 壳内径${CS[R.ct].cmax}mm</div>`;
  else h+=`<div class="ng">⛔ N/P=${R.npRatio.toFixed(3)} < 1.05 析锂风险</div>`;
  document.getElementById('rc').innerHTML=h;
}

function drawV(){
  if(!R)return;
  let cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  cv.width=360;cv.height=400;let cx=180,cy=200,sc=120;
  let sr=sc,cr=sc*(R.coreD/2)/(CS[R.ct].iD/2),mr=sc*(V('md')/2)/(CS[R.ct].iD/2);
  ctx.strokeStyle='#C7C7CC';ctx.lineWidth=3;ctx.beginPath();ctx.arc(cx-100,cy,sr,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#8E8E93';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('钢壳',cx-100,cy-sr-8);
  ctx.strokeStyle=R.coreFit?'#34C759':'#FF3B30';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx-100,cy,cr,0,Math.PI*2);ctx.stroke();

  let vr=R.coreFit?sr*0.88:sr*1.15;ctx.strokeStyle=R.coreFit?'#34C759':'#FF3B30';ctx.lineWidth=R.coreFit?2:3;
  ctx.beginPath();ctx.arc(cx+90,cy,vr,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#8E8E93';ctx.font='10px sans-serif';ctx.fillText(`${R.ct} | ${R.layers}层 | 裕量${R.margin.toFixed(2)}mm`,cx,cy+sr+20);
  document.getElementById('vl').textContent=R.coreFit?`裕量 ${R.margin.toFixed(2)}mm`:`SOC100%膨胀后超限!`;
}
